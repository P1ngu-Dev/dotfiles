###################
### KEYBINDINGS ###
###################

# Window manager y apps básicas
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, RETURN, exec, $terminalAlt --class=fastfetch sh -c 'fastfetch; exec $SHELL'
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod ALT, SPACE, togglefloating, # Movido desde V
bind = $mainMod, P, pseudo,
# bind = $mainMod, I, togglesplit,

# ==========================================
# CAELESTIA SHELL KEYBINDS
# ==========================================

# --- Launcher ---
bind = $mainMod, SPACE, global, $menu

# --- Session Menu ---
bind = $mainMod, M, global, caelestia:session

# --- Utilities ---
# Portapapeles y Emojis
bind = $mainMod, V, exec, pkill fuzzel || caelestia clipboard
bind = $mainMod, Period, exec, pkill fuzzel || caelestia emoji -p

# Capturas de pantalla
bindl = , Print, exec, caelestia screenshot
bind = $mainMod+Shift, S, global, caelestia:screenshotFreeze
bind = $mainMod+Shift+Alt, S, global, caelestia:screenshot

# Grabación
bind = Ctrl+Alt, R, exec, caelestia record

# Color picker
bind = $mainMod ALT, C, exec, hyprpicker -a

# Barra lateral / Centro de control
bind = $mainMod, N, global, caelestia:sidebar
bind = $mainMod, K, global, caelestia:showall
bindl = Ctrl+Alt, C, global, caelestia:clearNotifs

# Bloqueo de pantalla
bind = $mainMod, L, global, caelestia:lock
bindl = $mainMod+Alt, L, global, caelestia:lock

# Suspender sistema
bind = $mainMod SHIFT, L, exec, systemctl suspend

# Special Workspace (Caelestia)
bind = $mainMod, S, exec, caelestia toggle specialws
# ==========================================

# Keybinds para scripts personalizados
bind = $mainMod, H, exec, $scriptsDir/KeyHints.sh
bind = $mainMod SHIFT, K, exec, $scriptsDir/KeyBinds.sh

# Focus y movimiento con HJKL (no con flechas)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u

# Resize de ventanas con teclado
bind = $mainMod CTRL, H, resizeactive, -30 0
bind = $mainMod CTRL, L, resizeactive, 30 0
bind = $mainMod CTRL, K, resizeactive, 0 -30
bind = $mainMod CTRL, J, resizeactive, 0 30

# Toggle fullscreen
bind = $mainMod, F, fullscreen, 1 
bind = $mainMod SHIFT, F, fullscreen, 

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, F12, workspace, 11 # For TV

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, F12, workspace, 11 # For TV

# Scroll por workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Navegación por monitor con flechas
bind = $mainMod, left, workspace, e-1
bind = $mainMod, right, workspace, e+1

# Mover/resize con mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Teclas multimedia del laptop
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media control con playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
