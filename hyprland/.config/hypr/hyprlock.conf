general {
    hide_cursor = true
    ignore_empty_input = false
    immediate_render = true
    fail_timeout = 2000
}

# Fondo con screenshot de tu desktop + blur
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8000
    vibrancy = 0.1696
    vibrancy_darkness = 0.05
}

# Hora grande centrada
label {
    monitor =
    text = $TIME
    color = rgba(205, 204, 202, 0.9)
    font_size = 80
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)

    position = 0, 120
    halign = center
    valign = center
}

# Fecha
label {
    monitor =
    text = cmd[update:60000] date '+%A, %d de %B'
    color = rgba(122, 121, 116, 0.9)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.4)

    position = 0, 40
    halign = center
    valign = center
}

# Campo de contraseña
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    rounding = 8

    outer_color = rgba(57, 56, 54, 0.8)
    inner_color = rgba(28, 27, 25, 0.7)
    font_color = rgba(205, 204, 202, 1.0)
    font_family = JetBrainsMono Nerd Font

    check_color = rgba(79, 152, 163, 1.0)
    fail_color = rgba(161, 44, 68, 1.0)
    fail_text = <i>$FAIL</i>

    placeholder_text = <i>contraseña...</i>
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    fade_on_empty = true

    position = 0, -60
    halign = center
    valign = center
}
