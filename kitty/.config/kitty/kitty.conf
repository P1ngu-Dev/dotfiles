# ~/.config/kitty/kitty.conf

shell /usr/bin/zsh

# === FUENTES ===
font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
font_size        14.0

# === VENTANA ===
# hide_window_decorations yes
# x11_hide_window_decorations True
linux_display_server wayland
window_padding_width 15
window_margin_width 0
confirm_os_window_close 0
remember_window_size yes
initial_window_width 1200
initial_window_height 800

# === CURSOR ===
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# === SCROLLBACK ===
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# === MOUSE ===
copy_on_select yes
strip_trailing_spaces smart

# === TERMINAL BELL ===
enable_audio_bell no
visual_bell_duration 0.0

# === TABS ===
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"

# vim:ft=kitty

## name:     Catppuccin Kitty Frappé
## author:   Catppuccin Org
## license:  MIT
## upstream: https://github.com/catppuccin/kitty/blob/main/themes/frappe.conf
## blurb:    Soothing pastel theme for the high-spirited!



# The basic colors
foreground              #c6d0f5
background              #303446
selection_foreground    #303446
selection_background    #f2d5cf

# Cursor colors
cursor                  #f2d5cf
cursor_text_color       #303446

# Scrollbar colors
scrollbar_handle_color  #949cbb
scrollbar_track_color   #51576d

# URL color when hovering with mouse
url_color               #f2d5cf

# Kitty window border colors
active_border_color     #babbf1
inactive_border_color   #737994
bell_border_color       #e5c890

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #232634
active_tab_background   #ca9ee6
inactive_tab_foreground #c6d0f5
inactive_tab_background #292c3c
tab_bar_background      #232634

# Colors for marks (marked text in the terminal)
mark1_foreground #303446
mark1_background #babbf1
mark2_foreground #303446
mark2_background #ca9ee6
mark3_foreground #303446
mark3_background #85c1dc

# The 16 terminal colors

# black
color0 #51576d
color8 #626880

# red
color1 #e78284
color9 #e78284

# green
color2  #a6d189
color10 #a6d189

# yellow
color3  #e5c890
color11 #e5c890

# blue
color4  #8caaee
color12 #8caaee

# magenta
color5  #f4b8e4
color13 #f4b8e4

# cyan
color6  #81c8be
color14 #81c8be

# white
color7  #b5bfe2
color15 #a5adce

# === TRANSPARENCIA Y BLUR ===
background_opacity 0.85
dynamic_background_opacity yes
background_blur 20

# === SHORTCUTS ===
map ctrl+shift+c copy_to_clipboard
map ctrl+v paste_from_clipboard
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 1
