[appearance]

[appearance.themes]
system_theme = false
theme = {
  custom = { name = "Caelestia Theme", path = "/home/pingu/.local/share/warp-terminal/themes/caelestia.yaml" },
}

[appearance.vertical_tabs]
enabled = false

[appearance.window]
zoom_level = 175
override_opacity = 70

[appearance.text]
notebook_font_size = 14.0
font_size = 13.0

[terminal]

[terminal.input]
input_box_type_setting = "universal"

[agents]
cloud_conversation_storage_enabled = true

[agents.warp_agent]
is_any_ai_enabled = true

[agents.warp_agent.input]
nld_in_terminal_enabled = false

[agents.warp_agent.other]
show_agent_notifications = true
show_conversation_history = true

[agents.third_party]
should_render_cli_agent_toolbar = true

[account]
is_settings_sync_enabled = true

[general]
default_session_mode = "agent"
show_warning_before_quitting = false

[code]

[code.editor]
show_code_review_button = true
show_project_explorer = true
show_global_search = true

[warp_drive]
enabled = true

[privacy]
telemetry_enabled = true
crash_reporting_enabled = true
