[appearance]

[appearance.themes]
system_theme = false
theme = {
  custom = { name = "Caelestia Theme", path = "/home/pingu/.local/share/warp-terminal/themes/caelestia.yaml" },
}

[appearance.vertical_tabs]
enabled = false

[appearance.window]
zoom_level = 125
override_opacity = 70

[appearance.text]
notebook_font_size = 14.0
font_size = 16.0
font_name = "JetBrainsMonoNL Nerd Font Mono"
ai_font_name = "JetBrainsMonoNL Nerd Font Mono"
match_ai_font = false

[appearance.input]
input_mode = "waterfall"

[appearance.tabs]
workspace_decoration_visibility = "hide_fullscreen"
tab_close_button_position = "right"

[appearance.cursor]
cursor_display_type = "bar"

[terminal]
use_audible_bell = false
osc52_clipboard_access = "write_only"

[terminal.input]
input_box_type_setting = "classic"
honor_ps1 = true

[agents]
cloud_conversation_storage_enabled = true

[agents.warp_agent]
is_any_ai_enabled = true

[agents.warp_agent.input]
nld_in_terminal_enabled = false

[agents.warp_agent.other]
show_agent_notifications = true
show_conversation_history = true

[agents.third_party]
should_render_cli_agent_toolbar = true

[account]
is_settings_sync_enabled = true

[general]
default_session_mode = "terminal"
show_warning_before_quitting = false

[code]

[code.editor]
show_code_review_button = true
show_project_explorer = true
show_global_search = true

[warp_drive]
enabled = true

[privacy]
telemetry_enabled = true
crash_reporting_enabled = true

[notifications]
toast_duration_secs = 8

[notifications.preferences]
is_agent_task_completed_enabled = true
is_long_running_enabled = true
is_needs_attention_enabled = true
is_password_prompt_enabled = true
long_running_threshold = 30
mode = "enabled"
play_notification_sound = true

[session]

[session.working_directory_config]
advanced_mode = false
global = { custom_dir = "", mode = "home_dir" }
new_tab = { custom_dir = "", mode = "previous_dir" }
new_window = { custom_dir = "", mode = "previous_dir" }
split_pane = { custom_dir = "", mode = "previous_dir" }

[system]
force_x11 = true
